name: Docs Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      LIBTORCH_VERSION: 2.9.1

    steps:
      - uses: actions/checkout@v4

      - name: Initialize required submodules
        run: |
          git submodule update --init --depth 1 external/soxr

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Set up Lean toolchain
        run: |
          elan toolchain install $(cat lean-toolchain)
          elan default $(cat lean-toolchain)

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates lsb-release wget
          codename="$(lsb_release --codename --short)"
          arrow_repo_pkg="apache-arrow-apt-source-latest-${codename}.deb"
          wget "https://packages.apache.org/artifactory/arrow/ubuntu/${arrow_repo_pkg}"
          sudo apt-get install -y -V "./${arrow_repo_pkg}"
          rm -f "${arrow_repo_pkg}"
          sudo apt-get update
          sudo apt-get install -y libomp-dev libarrow-dev libparquet-dev libsoxr-dev unzip

      - name: Cache LibTorch
        id: cache-libtorch
        uses: actions/cache@v4
        with:
          path: external/libtorch
          key: libtorch-${{ runner.os }}-${{ runner.arch }}-${{ env.LIBTORCH_VERSION }}

      - name: Download LibTorch
        if: steps.cache-libtorch.outputs.cache-hit != 'true'
        run: |
          mkdir -p external
          LIBTORCH_URL="https://download.pytorch.org/libtorch/cpu/libtorch-shared-with-deps-${LIBTORCH_VERSION}%2Bcpu.zip"
          echo "Downloading ${LIBTORCH_URL}"
          curl --fail --location --retry 5 --retry-all-errors --show-error -o libtorch.zip "${LIBTORCH_URL}"
          unzip -tq libtorch.zip
          unzip -q libtorch.zip -d external/
          rm libtorch.zip

      - name: Prepare doc-gen4 path dependency
        run: |
          rm -rf "$GITHUB_WORKSPACE/../doc-gen4"
          git clone --depth 1 https://github.com/cpehle/doc-gen4.git "$GITHUB_WORKSPACE/../doc-gen4"

      - name: Create docbuild package
        run: |
          mkdir -p docbuild
          cp lean-toolchain docbuild/lean-toolchain
          ln -sfn ../external docbuild/external
          ln -sfn ../cc docbuild/cc
          ln -sfn ../docs docbuild/docs
          cat > docbuild/lakefile.toml <<'EOF'
          name = "docbuild"
          reservoir = false
          version = "0.1.0"
          srcDir = "."
          packagesDir = "../.lake/packages"

          [[require]]
          name = "tyr"
          path = "../"

          [[require]]
          name = "doc-gen4"
          path = "../../doc-gen4"
          EOF

      - name: Build docs
        run: |
          lean_prefix="$(lean --print-prefix)"
          multiarch_dir="/usr/lib/$(gcc -print-multiarch)"
          gomp_dir="$(dirname "$(gcc -print-file-name=libgomp.so)")"
          export LEAN_CC="$GITHUB_WORKSPACE/scripts/lean_cc_wrapper.sh"
          export LEAN_CC_GCC="/usr/bin/gcc"
          export LIBRARY_PATH="${multiarch_dir}:${gomp_dir}:/usr/lib:${LIBRARY_PATH:-}"
          export LD_LIBRARY_PATH="$GITHUB_WORKSPACE/external/libtorch/lib:${lean_prefix}/lib:${lean_prefix}/lib/glibc:${multiarch_dir}:${gomp_dir}:/usr/lib:${LD_LIBRARY_PATH:-}"
          cd docbuild
          lake build Tyr:docs

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docbuild/.lake/build/doc

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
